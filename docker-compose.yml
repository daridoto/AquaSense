services:
  postgres:
    image: postgres:16-alpine
    container_name: aquasense-db
    environment:
      POSTGRES_DB: aquasense
      POSTGRES_USER: aquasense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - aquasense-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquasense"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./aquasense-backend
    container_name: aquasense-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: postgresql://aquasense:${DB_PASSWORD}@postgres:5432/aquasense
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 28800000
      X_INTERNAL_TOKEN: ${X_INTERNAL_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  python:
    build: ./python
    container_name: aquasense-python
    environment:
      BACKEND_URL: http://backend:8080
      X_INTERNAL_TOKEN: ${X_INTERNAL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped

  frontend:
    build:
      context: ./aquasense-frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: aquasense-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aquasense-db-data:
