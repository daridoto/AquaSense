# Servidor
server.port=${PORT:8080}

# H2 - base de datos en memoria (desarrollo)
spring.datasource.url=jdbc:h2:mem:aquasense;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (valor real en el .env)
jwt.secret=${JWT_SECRET:dev_secret_key_aquasense_change_in_production_32chars}
jwt.expiration=28800000

# Token interno para /interno/**
internal.token=${X_INTERNAL_TOKEN:aquasense_internal_secret}

# SMTP — opcional (si SMTP_HOST no está definido, el email queda desactivado)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SMTP_FROM:noreply@aquasense.io}

# Logging
logging.level.com.aquasense=DEBUG
