spring.datasource.url=${DATABASE_URL}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.jackson.serialization.write-dates-as-timestamps=false
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}
internal.token=${X_INTERNAL_TOKEN}
logging.level.com.aquasense=INFO

# Connection pool — default 10 era insuficiente para carga real
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Compressão HTTP — reduz tráfego em /estado (chamado a cada 5s)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=512
